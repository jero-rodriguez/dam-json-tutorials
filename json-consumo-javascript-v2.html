<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <a href="index.html">← Volver al Menú Principal</a>
    <div class="container">
        <h1>Consumir un JSON con JavaScript #2</h1>
        <form action="">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre"><br><br>

            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos"><br><br>

            <label for="aficiones">Aficiones (separadas por comas):</label>
            <input type="text" id="aficiones" name="aficiones"><br><br>

            <label for="calle">Calle:</label>
            <input type="text" id="calle" name="calle"><br><br>

            <label for="ciudad">Ciudad:</label>
            <input type="text" id="ciudad" name="ciudad"><br><br>

            <label for="suscrito">Suscrito:</label>
            <input type="checkbox" id="suscrito" name="suscrito">


            <input type="submit" value="Enviar">
        </form>

        <script>
            let miCliente = fetch('assets/miCliente.json')
                .then(response => response.json())
                .then(cliente => {
                    document.getElementById('nombre').value = cliente.nombre;
                    document.getElementById('apellidos').value = cliente.apellidos;
                    document.getElementById('calle').value = cliente.direccion.calle;
                    document.getElementById('ciudad').value = cliente.direccion.poblacion;
                    if (cliente.suscrito) {
                        document.getElementById('suscrito').checked = true;
                    } else {
                        document.getElementById('suscrito').checked = false;
                    }

                    for (let i = 0; i < cliente.aficiones.length; i++) {
                        let aficion = cliente.aficiones[i];
                        if (i === cliente.aficiones.length - 1) {
                            document.getElementById('aficiones').value += aficion;
                        } else {
                            document.getElementById('aficiones').value += aficion + ', ';
                        }

                    }
                }).catch(error => console.error('Error al cargar el JSON:', error));

        </script>
    </div>
</body>

</html>
