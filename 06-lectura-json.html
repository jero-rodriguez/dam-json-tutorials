<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06 - Lectura de JSON</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header>
        <h1>Lectura de JSON con Fetch</h1>
        <p>Práctica de Lenguaje de Marcas - DAM</p>
    </header>

    <main>
        <section class="card">
            <h2>Biblioteca (Datos importados desde JSON)</h2>
            <div id="loading" style="text-align: center; color: var(--secondary-color); padding: 1rem;">
                Cargando datos...
            </div>
            
            <div class="table-container" style="display: none;" id="tabla-container">
                <table id="libros-tabla">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Título</th>
                            <th>Autor</th>
                            <th>Año</th>
                            <th>Género</th>
                        </tr>
                    </thead>
                    <tbody id="libros-body">
                        <!-- El contenido se inyectará dinámicamente -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="assets/06-lectura-json.js"></script>
</body>
</html>
