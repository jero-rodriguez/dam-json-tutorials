<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <div id="contenido">

    </div>
    <script>
        let miCliente = fetch('/assets/miCliente.json')
            .then(response => response.json())
            .then(cliente => {
                console.log(JSON.stringify(cliente));
                alert(cliente.apellidos);
                alert(cliente.aficiones[1]);
                alert(cliente.direccion.calle);

                document.getElementById("contenido").textContent = JSON.stringify(cliente, undefined, 2);
            }).catch(error => console.error('Error al cargar el JSON:', error));


    </script>
</body>

</html>
