<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01 - Objetos y Clases en JS</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header>
        <h1>Objetos y Clases en JavaScript</h1>
        <p>Práctica de Lenguaje de Marcas - DAM</p>
        <nav style="margin-top: 1rem;">
            <a href="index.html" style="text-decoration: none; color: white; background-color: var(--primary-color); padding: 0.5rem 1rem; border-radius: 4px; font-weight: bold; font-size: 0.9rem; display: inline-block;">&larr; Volver al Índice</a>

    <main>

    <script src="assets/01-objetos-clases.js"></script>
