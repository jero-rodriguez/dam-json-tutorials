<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>07 - JSON y Formularios</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: inherit;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }

        button[type="submit"] {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        button[type="submit"]:hover {
            background-color: #2980b9;
        }

        .code-block {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 1.5rem;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: auto;
            margin-top: 1rem;
            white-space: pre-wrap;
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>JSON y Formularios</h1>
        <p>Práctica de Lenguaje de Marcas - DAM</p>
    </header>

    <main>
        <section class="card">
            <h2>Registro de Nuevo Alumno</h2>
            <form id="formulario-alumno">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ej. Juan Pérez">
                </div>
                
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required placeholder="juan@ejemplo.com">
                </div>
                
                <div class="form-group">
                    <label for="curso">Curso a matricularse</label>
                    <select id="curso" name="curso" required>
                        <option value="">-- Selecciona un curso --</option>
                        <option value="DAM">Desarrollo de Aplicaciones Multiplataforma (DAM)</option>
                        <option value="DAW">Desarrollo de Aplicaciones Web (DAW)</option>
                        <option value="ASIR">Admin. Sistemas Informáticos en Red (ASIR)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="edad">Edad</label>
                    <input type="number" id="edad" name="edad" min="16" max="99" required>
                </div>

                <button type="submit">Enviar y Generar JSON</button>
            </form>

            <h3 style="margin-top: 2rem; color: var(--primary-color);">Payload JSON Generado (Simulación API):</h3>
            <div id="resultado-json" class="code-block"></div>
        </section>
    </main>

    <script src="assets/07-json-formularios.js"></script>
</body>
</html>
